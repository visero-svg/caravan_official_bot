<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить поход в Караван</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        h1 { text-align: center; margin-bottom: 20px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--tg-theme-hint-color); background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); font-size: 16px; box-sizing: border-box; }
        textarea { height: 120px; resize: vertical; }
        .note { font-size: 14px; color: var(--tg-theme-hint-color); background: var(--tg-theme-secondary-bg-color); padding: 15px; border-radius: 8px; margin: 20px 0; }
        .success { color: #4CAF50; font-weight: bold; text-align: center; margin: 20px 0; display: none; }
    </style>
</head>
<body>
    <h1>Добавить новый поход</h1>

    <div class="note">
        <b>Фото:</b> После отправки формы прикрепите фото к следующему сообщению в чате.
    </div>

    <div class="success" id="successMessage">✅ Текст отправлен! Теперь прикрепите фото.</div>

    <form id="hikeForm">
        <label>Название похода *</label>
        <input type="text" id="title" required>

        <label>Дата начала *</label>
        <input type="date" id="startDate" required>

        <label>Число дней</label>
        <input type="number" id="nDays" value="1" min="1">

        <label>Дистанция, км</label>
        <input type="text" id="distance">

        <label>Вид похода</label>
        <select id="kindId">
            <option value="1">КАРАВАН-ПВД</option>
            <option value="4">КАРАВАН-Марафон</option>
            <option value="6">Караван-Прогульщик</option>
            <option value="3">КАРАВАН-Экспедиция</option>
            <option value="5">Спорт-КАРАВАН</option>
            <option value="9">КАРАВАН-Винегрет</option>
        </select>

        <label>Темп</label>
        <select id="tempId">
            <option value="1">Средний темп</option>
            <option value="3">Быстрый темп</option>
            <option value="2">Медленный темп</option>
            <option value="9">Средний комфортный темп</option>
        </select>

        <!-- Единая база руководителей -->
        <label>Руководитель (ФИО) *</label>
        <select id="headName" required>
            <option value="">— Выберите руководителя —</option>
        </select>

        <label>Telegram руководителя</label>
        <input type="text" id="headTelegram" readonly>

        <label>Телефон руководителя</label>
        <input type="tel" id="headPhone" readonly>

        <label>Второй руководитель (ФИО)</label>
        <select id="subHeadName">
            <option value="">— Не указан —</option>
        </select>

        <label>Telegram второго руководителя</label>
        <input type="text" id="subHeadTelegram" readonly>

        <label>Телефон второго руководителя</label>
        <input type="tel" id="subHeadPhone" readonly>

        <label>Описание похода *</label>
        <textarea id="description" required></textarea>

        <label>Место и время встречи</label>
        <textarea id="meetingPoint"></textarea>

        <label>Транспорт (название)</label>
        <input type="text" id="transport">

        <label>Ссылка на расписание транспорта</label>
        <input type="url" id="transportURL">

        <label>Ссылка на трек/карту</label>
        <input type="url" id="trackURL">
    </form>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ==================== ЕДИНАЯ БАЗА РУКОВОДИТЕЛЕЙ ====================
        const leaders = [
            { name: "Архипов Михаил",     telegram: "",     phone: "+79151568086" },
            { name: "Залёткин Игорь",     telegram: "",     phone: "+79175838612" },
            { name: "Антонов Алексей",    telegram: "",      phone: "+79629422194" },
            { name: "Решетов Дмитрий",    telegram: "@xde45",     phone: "+79163069218" },
            { name: "Ливеровский Леонид", telegram: "",   phone: "+79036851478" },
            { name: "Пересыпкин Виталий", telegram: "@V_Vit",   phone: "+79265762462" },
            { name: "Макарова Светлана",  telegram: "",     phone: "+79055604474" },
            { name: "Огнев Андрей",       telegram: "",        phone: "+79153771101" },
            { name: "Мошков Александр",   telegram: "",      phone: "+79032047886" },
            { name: "Иванов Фёдор",       telegram: "",       phone: "+79104436106" },
            { name: "Прищепа Евгений",    telegram: "",   phone: "+79104167156" },
            { name: "Бородин Владимир",   telegram: "@v4v12v13",       phone: "" },
            { name: "Лукин Константин",   telegram: "@KonstantYn_Y",        phone: "+79166775515" },
            { name: "Рогов Мартирос",   telegram: "",        phone: "+79036117777" },
            { name: "САМОСТОЯТЕЛЬНО",     telegram: "",                phone: "" }
            // Добавляйте новых руководителей сюда ↑
        ];

        // Заполнение списков
        function populateLeaders() {
            const headSelect = document.getElementById('headName');
            const subHeadSelect = document.getElementById('subHeadName');

            leaders.forEach(leader => {
                const opt1 = new Option(leader.name, leader.name);
                const opt2 = new Option(leader.name, leader.name);
                headSelect.add(opt1);
                subHeadSelect.add(opt2);
            });
        }

        // Автозаполнение полей
        function setupAutoFill(selectId, telegramId, phoneId) {
            document.getElementById(selectId).addEventListener('change', function() {
                const selected = this.value;
                const leader = leaders.find(l => l.name === selected);
                
                document.getElementById(telegramId).value = leader ? leader.telegram : "";
                document.getElementById(phoneId).value = leader ? leader.phone : "";
            });
        }

        tg.MainButton.text = "Отправить в канал";
        tg.MainButton.color = "#2481cc";
        tg.MainButton.show();
        tg.MainButton.enable();

        // Инициализация
        window.onload = function() {
            populateLeaders();
            setupAutoFill('headName', 'headTelegram', 'headPhone');
            setupAutoFill('subHeadName', 'subHeadTelegram', 'subHeadPhone');
        };

        // Отправка формы
        tg.MainButton.onClick(() => {
            tg.MainButton.disable();
            tg.MainButton.text = "Отправка...";

            try {
                const data = {
                    title: document.getElementById('title').value.trim(),
                    startDate: document.getElementById('startDate').value,
                    nDays: document.getElementById('nDays').value || "1",
                    distance: document.getElementById('distance').value.trim(),
                    kindId: document.getElementById('kindId').value,
                    tempId: document.getElementById('tempId').value,
                    headName: document.getElementById('headName').value.trim(),
                    headTelegram: document.getElementById('headTelegram').value.trim(),
                    headPhone: document.getElementById('headPhone').value.trim(),
                    subHeadName: document.getElementById('subHeadName').value.trim(),
                    subHeadTelegram: document.getElementById('subHeadTelegram').value.trim(),
                    subHeadPhone: document.getElementById('subHeadPhone').value.trim(),
                    description: document.getElementById('description').value.trim(),
                    meetingPoint: document.getElementById('meetingPoint').value.trim(),
                    transport: document.getElementById('transport').value.trim(),
                    transportURL: document.getElementById('transportURL').value.trim(),
                    trackURL: document.getElementById('trackURL').value.trim(),
                };

                if (!data.title || !data.startDate || !data.description || !data.headName) {
                    tg.showAlert("Заполните обязательные поля:\n• Название\n• Дата\n• Описание\n• Руководитель");
                    tg.MainButton.enable();
                    tg.MainButton.text = "Отправить в канал";
                    return;
                }

                // Формирование текста поста
                let text = `🚵‍♂️ <b>${data.title}</b>\n\n`;
                text += `<b>Дата:</b> ${data.startDate}`;
                if (data.nDays > 1) text += ` (${data.nDays} дня)\n`;
                else text += `\n`;
                if (data.distance) text += `<b>Дистанция:</b> ${data.distance} км\n`;

                text += `<b>Руководитель:</b> ${data.headName}`;
                if (data.headTelegram) text += ` (<a href="https://t.me/${data.headTelegram.replace(/^@/, '')}">${data.headTelegram}</a>)`;
                if (data.headPhone) text += `\n<b>Телефон:</b> ${data.headPhone}`;

                if (data.subHeadName) {
                    text += `\n<b>Второй руководитель:</b> ${data.subHeadName}`;
                    if (data.subHeadTelegram) text += ` (<a href="https://t.me/${data.subHeadTelegram.replace(/^@/, '')}">${data.subHeadTelegram}</a>)`;
                    if (data.subHeadPhone) text += `\n<b>Телефон:</b> ${data.subHeadPhone}`;
                }

                text += `\n\n<b>Описание:</b>\n${data.description}`;
                if (data.meetingPoint) text += `\n\n<b>Встреча:</b>\n${data.meetingPoint}`;
                if (data.transport) {
                    text += `\n\n<b>Транспорт:</b> ${data.transport}`;
                    if (data.transportURL) text += ` (<a href="${data.transportURL}">расписание</a>)`;
                }
                if (data.trackURL) text += `\n\n<b>Трек:</b> <a href="${data.trackURL}">трек</a>`;

                tg.sendData(JSON.stringify({ action: "publish_hike", text: text }));

                document.getElementById('successMessage').style.display = 'block';
                tg.MainButton.text = "Отправлено! Готово к новому";
                tg.MainButton.enable();

            } catch (err) {
                console.error(err);
                tg.showAlert("Ошибка: " + err.message);
                tg.MainButton.enable();
                tg.MainButton.text = "Отправить в канал";
            }
        });
    </script>
</body>
</html>
